name: Intake Import

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: intake-import
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore cached tokens
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            .drchrono_token.json
          key: intake-state-${{ github.run_id }}
          restore-keys: intake-state-

      - name: Write secrets to files
        run: |
          echo '${{ secrets.ENV_FILE }}' > .env
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json
          echo '${{ secrets.GOOGLE_TOKEN }}' > token.json

          # DrChrono token: prefer cached (it rotates), fall back to secret
          if [ ! -f .drchrono_token.json ]; then
            echo '${{ secrets.DRCHRONO_TOKEN }}' > .drchrono_token.json
          fi

      - name: Run intake import
        run: python import_intake.py
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Save tokens to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .drchrono_token.json
          key: intake-state-${{ github.run_id }}
